<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>City Weather</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="command-panel" aria-labelledby="app-title">
        <div class="brand-block">
          <p class="eyebrow">Live city forecast</p>
          <h1 id="app-title">City Weather</h1>
        </div>

        <form id="weather-form" class="weather-form">
          <div class="form-grid">
            <div class="city-field">
              <label class="field-label" for="city-input">City</label>
              <div class="search-row">
                <input id="city-input" name="city" type="search" autocomplete="address-level2" placeholder="Seattle" maxlength="80" required>
                <button class="primary-button" type="submit">Search</button>
              </div>
            </div>

            <fieldset class="unit-field">
              <legend>Units</legend>
              <div class="segmented-control">
                <label class="segmented-option">
                  <input type="radio" name="units" value="imperial">
                  <span>Imperial</span>
                </label>
                <label class="segmented-option">
                  <input type="radio" name="units" value="metric">
                  <span>Metric</span>
                </label>
              </div>
            </fieldset>

            <div class="refresh-field">
              <span class="field-label">Data</span>
              <button id="refresh-button" class="secondary-button" type="button" disabled>Refresh</button>
            </div>
          </div>
        </form>
      </section>

      <section id="status" class="status is-idle" role="status" aria-live="polite">
        Enter a city to load current weather.
      </section>

      <section id="weather-dashboard" class="weather-dashboard" aria-label="Current weather dashboard" hidden>
        <section class="current-panel" aria-label="Current conditions">
          <div class="current-summary">
            <p id="location-name" class="location-name"></p>
            <p id="condition-text" class="condition-text"></p>
            <p id="current-temp" class="current-temp"></p>
            <p id="feels-like" class="supporting-text"></p>
          </div>
          <div class="condition-visual" id="condition-visual" aria-hidden="true"></div>
        </section>

        <section class="details-section" aria-labelledby="details-title">
          <div class="section-heading">
            <h2 id="details-title">Current details</h2>
          </div>
          <div class="planning-grid">
            <div class="metric-tile">
              <span>Humidity</span>
              <strong id="humidity"></strong>
            </div>
            <div class="metric-tile">
              <span>Wind</span>
              <strong id="wind"></strong>
            </div>
            <div class="metric-tile">
              <span>Rain now</span>
              <strong id="precipitation"></strong>
            </div>
            <div class="metric-tile">
              <span>Cloud cover</span>
              <strong id="cloud-cover"></strong>
            </div>
            <div class="metric-tile">
              <span>Pressure</span>
              <strong id="pressure"></strong>
            </div>
            <div class="metric-tile">
              <span>Gusts</span>
              <strong id="gusts"></strong>
            </div>
          </div>
        </section>

        <section class="details-section" aria-labelledby="today-title">
          <div class="section-heading">
            <h2 id="today-title">Today</h2>
          </div>
          <div class="day-strip">
            <div>
              <span>High</span>
              <strong id="daily-high"></strong>
            </div>
            <div>
              <span>Low</span>
              <strong id="daily-low"></strong>
            </div>
            <div>
              <span>Rain chance</span>
              <strong id="rain-chance"></strong>
            </div>
            <div>
              <span>Sunrise</span>
              <strong id="sunrise"></strong>
            </div>
            <div>
              <span>Sunset</span>
              <strong id="sunset"></strong>
            </div>
          </div>
        </section>

        <footer class="data-footer">
          <span id="updated-at"></span>
          <a href="https://open-meteo.com/" rel="noreferrer" target="_blank">Weather data by Open-Meteo</a>
        </footer>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
